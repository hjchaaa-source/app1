<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 모바일 앱처럼 보이게 하는 PWA 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>타이타닉 X-파일: 생존의 법칙</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly.js for interactive charts -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .custom-checkbox:checked + div { background-color: #3b82f6; border-color: #3b82f6; color: white; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="antialiased overflow-hidden h-screen flex flex-col bg-slate-950">

    <!-- 📱 모바일 탑 헤더 (높이 고정으로 하단 레이아웃 계산 용이) -->
    <header id="app-header" class="w-full bg-slate-900/95 backdrop-blur-md border-b border-slate-800 p-4 shrink-0 flex flex-col gap-3 z-30">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">🚢 타이타닉 X-파일</h1>
            <span class="text-[10px] text-slate-400 px-2 py-0.5 rounded bg-slate-800 font-bold">Web App v3.5</span>
        </div>
        
        <!-- 🗂️ 3단 분할 탭 네비게이션 -->
        <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
            <button id="tab-btn-1" onclick="switchPage(1)" class="flex-1 py-2 rounded-lg text-xs font-bold text-white bg-blue-600 transition-all duration-300 flex items-center justify-center gap-1.5">
                🔍 1P: 필터
            </button>
            <button id="tab-btn-2" onclick="switchPage(2)" class="flex-1 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all duration-300 flex items-center justify-center gap-1.5">
                📋 2P: 요약
            </button>
            <button id="tab-btn-3" onclick="switchPage(3)" class="flex-1 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all duration-300 flex items-center justify-center gap-1.5">
                📈 3P: 차트
            </button>
        </div>
    </header>

    <!-- 📱 메인 콘텐츠 컨테이너 (스크롤 방지 및 안전 영역) -->
    <main class="flex-1 w-full overflow-hidden relative">
        
        <!-- 📂 1페이지 영역: 조건 필터 -->
        <section id="page-1" class="absolute inset-0 flex flex-col p-4 overflow-y-auto z-10">
            <div class="glass-panel rounded-2xl p-5 flex flex-col h-full justify-between gap-4">
                <div>
                    <h2 class="text-sm font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-2">
                        <span>🔍</span> 분석 그룹 필터링
                    </h2>

                    <!-- 성별 필터 -->
                    <div class="mb-4">
                        <h3 class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> 성별 (Sex)</h3>
                        <div class="flex gap-2">
                            <label class="flex-1 cursor-pointer">
                                <input type="checkbox" value="남성" class="filter-sex hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">남성</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="checkbox" value="여성" class="filter-sex hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">여성</div>
                            </label>
                        </div>
                    </div>

                    <!-- 객실 등급 필터 -->
                    <div class="mb-4">
                        <h3 class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> 객실 등급 (Pclass)</h3>
                        <div class="flex gap-2">
                            <label class="flex-1 cursor-pointer">
                                <input type="checkbox" value="1" class="filter-pclass hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">1등실</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="checkbox" value="2" class="filter-pclass hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">2등실</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="checkbox" value="3" class="filter-pclass hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">3등실</div>
                            </label>
                        </div>
                    </div>

                    <!-- 나이대 필터 -->
                    <div class="mb-4">
                        <h3 class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> 나이대 (Age)</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="cursor-pointer">
                                <input type="checkbox" value="영유아" class="filter-age hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">👶 영유아</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" value="청소년" class="filter-age hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">🧑 청소년</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" value="성인" class="filter-age hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">👨 성인</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" value="노년" class="filter-age hidden custom-checkbox" checked>
                                <div class="text-center py-2.5 border border-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-850 text-slate-300">👴 노년</div>
                            </label>
                        </div>
                    </div>

                    <!-- 동반 가족 유무 필터 -->
                    <div class="mb-2">
                        <h3 class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-purple-500"></span> 동반 가족 (Family)</h3>
                        <select id="filter-alone" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl p-2.5 text-xs font-bold outline-none focus:border-blue-500 transition-colors">
                            <option value="전체">전체 (상관없음)</option>
                            <option value="혼자">👤 혼자 탑승</option>
                            <option value="가족 동반">👨‍👩‍👧‍👦 가족 동반</option>
                        </select>
                    </div>
                </div>
                
                <button onclick="resetFilters()" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 py-3 rounded-xl text-xs font-bold transition-colors shadow-lg mt-auto shrink-0">
                    🔄 필터 기본값 전체 선택
                </button>
            </div>
        </section>

        <!-- 📋 2페이지 영역: 실시간 지표 요약 및 시나리오 리포트 (스크롤 지원) -->
        <section id="page-2" class="absolute inset-0 flex flex-col p-4 overflow-y-auto hidden z-0">
            <div class="flex flex-col gap-4 min-h-full">
                <!-- 요약 설명 상단 카드 -->
                <div class="glass-panel p-4 rounded-2xl shrink-0">
                    <h2 class="text-base font-black text-white">📋 실시간 필터 분석 요약</h2>
                    <p class="text-[10px] text-slate-400 mt-0.5">역사적 사실과 사회학적 데이터를 결합한 커스텀 생존 내러티브입니다.</p>
                </div>

                <!-- 핵심 KPI 3구조 배치 -->
                <div class="grid grid-cols-3 gap-2.5 shrink-0">
                    <div class="glass-panel rounded-2xl p-3 border-t-2 border-slate-500 text-center">
                        <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-wider">표본 그룹</p>
                        <p class="text-xl font-black text-white"><span id="kpi-total">0</span> <span class="text-[10px] font-bold text-slate-500">명</span></p>
                    </div>
                    <div class="glass-panel rounded-2xl p-3 border-t-2 border-emerald-500 text-center">
                        <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-wider">구조 승객</p>
                        <p class="text-xl font-black text-emerald-400"><span id="kpi-survived">0</span> <span class="text-[10px] font-bold text-emerald-700">명</span></p>
                    </div>
                    <div id="kpi-rate-card" class="glass-panel rounded-2xl p-3 border-t-2 transition-all duration-300 text-center">
                        <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-wider">그룹 생존율</p>
                        <p class="text-xl font-black" id="kpi-rate">0.0%</p>
                    </div>
                </div>

                <!-- 🚨 실시간 동적 판정 및 역사 시나리오 (상세 서술 영역) -->
                <div id="dynamic-alert" class="p-5 rounded-2xl border-l-4 font-normal shadow-lg transition-all duration-300 text-xs leading-relaxed">
                    <!-- 자바스크립트로 세부적인 동적 역사적 분석문 주입 -->
                </div>

                <!-- 2페이지 전용 가이드 팁 -->
                <div class="glass-panel p-4 rounded-2xl border border-slate-800 flex items-start gap-3 bg-slate-900/40 mt-auto shrink-0">
                    <div class="text-lg leading-none mt-0.5">📈</div>
                    <p class="text-[11px] text-slate-400 leading-relaxed">
                        필터 조건에 따른 참상 재구성이 완료되었습니다. 다음 <b class="text-blue-400">[3P: 차트]</b> 탭에서 시각적인 통계 그래프를 확인해 보세요.
                    </p>
                </div>
            </div>
        </section>

        <!-- 📈 3페이지 영역: 시각화 차트 대시보드 (반응형 핏 적용, 기본 숨김) -->
        <section id="page-3" class="absolute inset-0 flex flex-col p-4 gap-4 hidden z-0 overflow-hidden h-full">
            <div class="flex-1 flex flex-col md:flex-row gap-4 h-full min-h-0 w-full">
                <!-- 파이 차트 박스 (전체 높이 분할) -->
                <div class="flex-1 min-h-0 glass-panel rounded-2xl p-4 flex flex-col border border-slate-800">
                    <h3 class="text-xs font-bold text-white border-b border-slate-800 pb-2 flex items-center gap-1.5 shrink-0">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> 생존 vs 사망 도넛 비율
                    </h3>
                    <div id="pie-chart" class="flex-1 w-full min-h-0"></div>
                </div>
                
                <!-- 항구별 등급 차트 박스 -->
                <div class="flex-1 min-h-0 glass-panel rounded-2xl p-4 flex flex-col border border-slate-800">
                    <h3 class="text-xs font-bold text-white border-b border-slate-800 pb-2 flex items-center gap-1.5 shrink-0">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span> 승선 항구별 객실 등급 분포
                    </h3>
                    <div id="port-class-chart" class="flex-1 w-full min-h-0"></div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // 전역 상수 및 설정
        const ports = ['사우샘프턴(S)', '셰르부르(C)', '퀸즈타운(Q)'];
        let activePage = 1;

        // 1. 타이타닉 가상 데이터 생성기 (실제 타이타닉 통계 비율 반영)
        const generateMockData = () => {
            const data = [];
            for (let i = 0; i < 800; i++) {
                const pclass = Math.random() < 0.25 ? 1 : (Math.random() < 0.5 ? 2 : 3);
                const sex = Math.random() < 0.65 ? '남성' : '여성';
                
                let age;
                const ageRand = Math.random();
                if (ageRand < 0.1) age = Math.floor(Math.random() * 12);
                else if (ageRand < 0.2) age = Math.floor(Math.random() * 7) + 12;
                else if (ageRand < 0.85) age = Math.floor(Math.random() * 41) + 19;
                else age = Math.floor(Math.random() * 20) + 60;

                let ageGroup = age < 12 ? '영유아' : (age < 19 ? '청소년' : (age < 60 ? '성인' : '노년'));
                const familySize = Math.random() < 0.6 ? 0 : Math.floor(Math.random() * 4) + 1;
                const isAlone = familySize === 0 ? '혼자' : '가족 동반';
                const embarked = ports[Math.floor(Math.random() * ports.length)];
                let fare = pclass === 1 ? Math.random() * 100 + 50 : (pclass === 2 ? Math.random() * 30 + 15 : Math.random() * 15 + 5);

                let survivalProb = 0.3; 
                if (sex === '여성') survivalProb += 0.45;
                if (pclass === 1) survivalProb += 0.35;
                if (pclass === 3) survivalProb -= 0.25;
                if (ageGroup === '영유아') survivalProb += 0.3;
                
                if (sex === '남성' && ageGroup === '성인' && pclass === 3) survivalProb = 0.08; 
                if (sex === '여성' && pclass === 1) survivalProb = 0.95; 

                const survived = Math.random() < survivalProb ? '생존' : '사망';
                data.push({ pclass: String(pclass), sex, age, ageGroup, familySize, isAlone, embarked, fare, survived });
            }
            return data;
        };

        const titanicData = generateMockData();

        // 현재 UI 필터 상태 취득
        const getSelectedFilters = () => {
            const getValues = (selector) => Array.from(document.querySelectorAll(selector + ':checked')).map(cb => cb.value);
            return {
                sex: getValues('.filter-sex'),
                pclass: getValues('.filter-pclass'),
                ageGroup: getValues('.filter-age'),
                isAlone: document.getElementById('filter-alone').value
            };
        };

        // 🧠 필터 조건 조합 기반 실시간 역사 내러티브 제너레이터
        const generateHistoricalNarrative = (filters, rate, total) => {
            const hasMale = filters.sex.includes('남성');
            const hasFemale = filters.sex.includes('여성');
            const has1st = filters.pclass.includes('1');
            const has2nd = filters.pclass.includes('2');
            const has3rd = filters.pclass.includes('3');
            const hasBaby = filters.ageGroup.includes('영유아');
            const hasSenior = filters.ageGroup.includes('노년');
            const alone = filters.isAlone;

            let text = "";
            let factors = [];

            text += `<div class="font-black text-sm text-slate-100 mb-3 flex items-center gap-1.5">🔬 선택 조건에 근거한 당시 생존 시나리오 재구성</div>`;

            // 1. 성별에 따른 대피 명령의 차이
            if (hasFemale && !hasMale) {
                factors.push("당시 타이타닉호의 2등 항해사 찰스 라이톨러는 <b>'여성과 아이 먼저(Women and children first)'</b> 지시를 '여성과 아이만 탑승'으로 엄격하게 오인 적용하여 빈자리가 있음에도 구명보트에 남성을 절대 태우지 않았습니다. 이 지시가 여성 선택군의 높은 생존율을 증명합니다.");
            } else if (hasMale && !hasFemale) {
                factors.push("남성들에게는 선박 재난의 거대한 <b>도덕 규범인 신사도(Chivalry)</b>의 억제력과, 여성 승객을 보호하려는 무장 경비 및 선원들의 직접적인 물리 제지가 작용했습니다. 이로 인해 대다수의 구명보트 좌석이 남성들에게 차단된 상태로 바다에 띄워졌습니다.");
            } else {
                factors.push("남성과 여성이 함께 선택된 그룹에서는 대피 명령 수신 및 구명조끼 수령 이후에도, <b>보트 데크 앞에서의 성별 분리 격차</b>가 삶과 죽음의 기로를 나누는 가장 잔혹하고 즉각적인 판단 변수로 작동했습니다.");
            }

            // 2. 선실 등급에 따른 공간적/권력적 비극
            if (has1st && !has3rd) {
                factors.push("1등실 귀족들은 <b>최상층 보트 갑판(Boat Deck)과 지리적으로 직결</b>되는 객실에 거주했습니다. 승무원들이 일일이 방문해 탑승을 권유했고, 구명조끼를 수령하기도 수월했습니다. 또한 극심한 혼잡과 차단을 겪지 않은 채 고요함 속에 최초 대피 보트들에 오를 수 있었습니다.");
            } else if (has3rd && !has1st) {
                factors.push("3등실 이민자 승객들은 <b>배의 맨 하부 지하 구획</b>에 수용되어 있었습니다. 차단된 방수벽, 복잡한 철망형 격벽 게이트, 그리고 영어를 이해하지 못하는 언어 장벽으로 인해 갑판으로 올라가는 탈출구 자체를 승무원들로부터 안내받지 못하는 공간적 소외를 겪었습니다.");
            } else if (has2nd && !has1st && !has3rd) {
                factors.push("2등실 중산층 객실은 1등실의 이송이 완료되기 전까지 갑판 진입 대기 명령을 받아 일부 중요한 탈출 골든타임을 허비했습니다. 그러나 하류층인 3등실 차단 게이트에 비해 승무원의 안내가 정상 배정되어 절반 가량의 생존 타협안을 지녔습니다.");
            } else {
                factors.push("선실 등급이 혼합된 구조의 경우, <b>객실의 층수 위치(갑판 접근성)와 당시 승무원들의 적극적 탈출 게이트 개방 여부</b>가 구조 순위를 좌우하는 가장 큰 자본적 격차 요인이었습니다.");
            }

            // 3. 약자 보호(나이대) 요인
            if (hasBaby && !hasSenior) {
                factors.push("아동/영유아들은 혼돈 상태에서도 <b>승무원 및 대다수 동승객들의 최우선 배려 대상</b>이 되었습니다. 다만 이 구조 원칙 또한 3등실 소속 아동들에게는 게이트 차단으로 인해 제한적으로 공급되는 안타까운 모순이 존재했습니다.");
            } else if (hasSenior && !hasBaby) {
                factors.push("영하 2도의 차가운 기온과 어둠 속 흔들리는 계단, 가파른 갑판은 <b>체력적 약자인 노년층 승객</b>들에게 극악의 물리적 조건이었습니다. 신체적 기동성 저하가 생존 통계에 불리하게 기록되었습니다.");
            }

            // 4. 가족 동반 심리
            if (alone === '혼자') {
                factors.push("<b>나 홀로 탑승한 승객들</b>은 가족과의 수색 혼선을 겪지 않고, 재난 소리를 감지하자마자 신속하게 대피 결단을 추진할 독립성을 확보했습니다. 다만 자격 분류 단계에서 약자 지원 우선순위로부터 완전히 밀려나 최종 탑승이 무산된 확률이 높습니다.");
            } else if (alone === '가족 동반') {
                factors.push("<b>가족을 동반한 승객들</b>에게는 참혹한 심리적 갈등이 닥쳤습니다. 보트에 먼저 타라는 자식을 안고 끝까지 남편 곁에 남은 아내들의 사례, 또는 선내 혼란 속에 서로를 놓치지 않으려 객실 복도를 지키다가 골든타임을 함께 소실한 눈물 어린 기록들이 이 통계에 스며있습니다.");
            }

            // 리스트 포맷화
            text += `<ul class="space-y-3.5 text-slate-300 font-light list-disc pl-4">`;
            text += factors.map(f => `<li>${f}</li>`).join("");
            text += `</ul>`;

            // 종합 역사 리포트 요약문
            text += `<div class="mt-5 pt-4 border-t border-slate-700/60 text-[11px] font-bold text-slate-400">`;
            text += `ℹ️ <b>역사학자 관점의 통계 해석:</b> 현재 선택한 인구 집단은 타이타닉호 전체 인프라 중 극적인 불평등과 계층적 생존 원칙이 결합하여 최종 <span class="text-blue-400 font-black">${rate}%</span>라는 구체적인 통계적 수치를 형성하게 되었습니다.`;
            text += `</div>`;

            return text;
        };

        // UI 통계 정보 및 스타일링 갱신
        const updateDashboard = () => {
            const filters = getSelectedFilters();
            
            const filteredData = titanicData.filter(p => {
                return filters.sex.includes(p.sex) && 
                       filters.pclass.includes(p.pclass) && 
                       filters.ageGroup.includes(p.ageGroup) && 
                       (filters.isAlone === '전체' || p.isAlone === filters.isAlone);
            });
            
            const total = filteredData.length;
            const survivedCount = filteredData.filter(d => d.survived === '생존').length;
            const survivalRate = total > 0 ? (survivedCount / total * 100).toFixed(1) : 0.0;

            document.getElementById('kpi-total').innerText = total;
            document.getElementById('kpi-survived').innerText = survivedCount;
            document.getElementById('kpi-rate').innerText = `${survivalRate}%`;

            const rateCard = document.getElementById('kpi-rate-card');
            const rateText = document.getElementById('kpi-rate');
            const alertBox = document.getElementById('dynamic-alert');

            if (total === 0) {
                rateCard.className = "glass-panel rounded-2xl p-3 border-t-2 border-slate-600 text-center";
                rateText.className = "text-xl font-black text-slate-500";
                
                alertBox.className = "p-5 rounded-2xl border-l-4 font-bold bg-slate-900 border-slate-500 text-slate-300 block";
                alertBox.innerHTML = `
                    <div class="font-black text-sm text-slate-100 mb-2">🔍 활성화 조건에 해당하는 승객 없음</div>
                    <p class="font-light text-slate-400">선택하신 조건 조합은 역사 속 타이타닉 탑승객 명단 중 매칭되는 실존 표본이 부족한 범위입니다. 조금 더 너그러운 옵션으로 재구성해 보세요.</p>
                `;
                
                Plotly.purge('pie-chart');
                Plotly.purge('port-class-chart');
                return;
            }

            // 생존율 별 요약 탭 카드 테두리 칼라 및 알림창 디자인 대응
            if (survivalRate < 20) {
                rateCard.className = "glass-panel rounded-2xl p-3 border-t-2 border-red-500 bg-red-950/20 text-center animate-pulse";
                rateText.className = "text-xl font-black text-red-500";
                alertBox.className = "p-5 rounded-2xl border-l-4 bg-red-950/30 border-red-500 text-red-200 block";
            } else if (survivalRate > 70) {
                rateCard.className = "glass-panel rounded-2xl p-3 border-t-2 border-emerald-500 bg-emerald-950/20 text-center";
                rateText.className = "text-xl font-black text-emerald-400";
                alertBox.className = "p-5 rounded-2xl border-l-4 bg-emerald-950/30 border-emerald-500 text-emerald-200 block";
            } else {
                rateCard.className = "glass-panel rounded-2xl p-3 border-t-2 border-blue-500 bg-blue-950/20 text-center";
                rateText.className = "text-xl font-black text-blue-400";
                alertBox.className = "p-5 rounded-2xl border-l-4 bg-blue-950/20 border-blue-500 text-blue-200 block";
            }

            // 동적 역사 시나리오 텍스트 대입
            alertBox.innerHTML = generateHistoricalNarrative(filters, survivalRate, total);

            // 📊 3P 차트 리사이징 플롯 로직
            const chartArea = document.getElementById('page-3');
            if (chartArea.classList.contains('hidden')) return; // 3P 탭이 비활성 상태일 때는 리사이징/렌더링 생략하여 불필요 연산 차단

            const pieContainer = document.getElementById('pie-chart');
            const barContainer = document.getElementById('port-class-chart');

            const pieHeight = pieContainer.clientHeight || 200;
            const barHeight = barContainer.clientHeight || 200;

            const layoutTheme = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8', family: 'Noto Sans KR', size: 10 },
                margin: { t: 15, b: 35, l: 30, r: 10 },
                autosize: true
            };

            // 1. 파이 차트 (도넛 형태)
            const pieData = [{
                values: [survivedCount, total - survivedCount],
                labels: ['생존', '사망'],
                type: 'pie',
                hole: 0.55,
                marker: { colors: ['#10b981', '#ef4444'], line: { color: '#0f172a', width: 2 } },
                textinfo: 'label+percent',
                textfont: { color: '#ffffff', size: 10, weight: 'bold' },
                hoverinfo: 'label+value'
            }];
            
            Plotly.newPlot('pie-chart', pieData, { 
                ...layoutTheme, 
                height: pieHeight, 
                showlegend: false 
            }, {displayModeBar: false, responsive: true});

            // 2. 누적 막대 차트 (항구별 객실 등급 분포)
            const pclasses = ['1', '2', '3'];
            const classNames = ['1등실', '2등실', '3등실'];
            const classColors = ['#facc15', '#60a5fa', '#94a3b8']; 

            const barData = pclasses.map((pclass, index) => {
                return {
                    x: ports,
                    y: ports.map(port => filteredData.filter(d => d.embarked === port && d.pclass === pclass).length),
                    name: classNames[index],
                    type: 'bar',
                    marker: { color: classColors[index], line: { color: '#0f172a', width: 1 } }
                };
            });
            
            const barLayout = {
                ...layoutTheme,
                barmode: 'stack',
                height: barHeight,
                yaxis: { title: '탑승객 (명)', gridcolor: '#1e293b', tickfont: { size: 9 } },
                xaxis: { gridcolor: '#1e293b', tickfont: { size: 9 } },
                legend: { orientation: 'h', y: -0.2, font: { color: '#cbd5e1', size: 9 } }
            };
            
            Plotly.newPlot('port-class-chart', barData, barLayout, {displayModeBar: false, responsive: true});
        };

        // 🗂️ 페이지(탭) 전환 함수
        const switchPage = (pageNum) => {
            activePage = pageNum;
            const page1 = document.getElementById('page-1');
            const page2 = document.getElementById('page-2');
            const page3 = document.getElementById('page-3');
            
            const btn1 = document.getElementById('tab-btn-1');
            const btn2 = document.getElementById('tab-btn-2');
            const btn3 = document.getElementById('tab-btn-3');

            // 전원 숨김 처리
            page1.classList.add('hidden');
            page2.classList.add('hidden');
            page3.classList.add('hidden');
            
            // 버튼 스타일 초기화
            const baseBtnStyle = "flex-1 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all duration-300 flex items-center justify-center gap-1.5";
            btn1.className = baseBtnStyle;
            btn2.className = baseBtnStyle;
            btn3.className = baseBtnStyle;

            const activeBtnStyle = "flex-1 py-2 rounded-lg text-xs font-bold text-white bg-blue-600 transition-all duration-300 flex items-center justify-center gap-1.5 shadow-[0_0_12px_rgba(37,99,235,0.4)]";

            if (pageNum === 1) {
                page1.classList.remove('hidden');
                btn1.className = activeBtnStyle;
            } else if (pageNum === 2) {
                page2.classList.remove('hidden');
                btn2.className = activeBtnStyle;
                updateDashboard(); // 2페이지 갈 때 최신 내러티브 적용되도록 호출
            } else if (pageNum === 3) {
                page3.classList.remove('hidden');
                btn3.className = activeBtnStyle;
                
                // 탭 전환 후 차트가 깨지지 않고 부모 컨테이너 크기에 완벽히 맞춰지도록 약간의 딜레이 리사이징
                setTimeout(() => {
                    updateDashboard();
                    Plotly.Plots.resize('pie-chart');
                    Plotly.Plots.resize('port-class-chart');
                }, 50);
            }
        };

        // 필터 초기화
        const resetFilters = () => {
            document.querySelectorAll('.custom-checkbox').forEach(cb => cb.checked = true);
            document.getElementById('filter-alone').value = '전체';
            updateDashboard();
        };

        // 이벤트 리스너 등록
        document.querySelectorAll('input[type="checkbox"], select').forEach(el => {
            el.addEventListener('change', updateDashboard);
        });

        // 실시간 브라우저 리사이징 대응
        window.addEventListener('resize', () => {
            if (activePage === 3) {
                updateDashboard();
                Plotly.Plots.resize('pie-chart');
                Plotly.Plots.resize('port-class-chart');
            }
        });

        // 최초 실행
        window.onload = () => {
            updateDashboard();
        };

    </script>
</body>
</html>
